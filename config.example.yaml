log:
  level: info
  format: json

# Where the engine quotes (maker_venue) and where it flattens fills
# (hedge_venue, optional). Each must reference an enabled venue block.
# Default = paper-only for safe local testing.
engine:
  maker_venue: paper        # paper | hyperliquid | binance
  hedge_venue: ""           # "" disables hedger; otherwise paper|hyperliquid|binance

# Sizes assume SOL ≈ $83. Tuned for a $5K paper balance:
#   base 0.5 ≈ $42 / level, max 5 ≈ $415 notional
assets:
  - symbol: SOL
    enabled: true
    base_quantity: 0.5
    spread_bps: 80
    requote_threshold_bps: 15
    max_position: 5
    max_leverage: 2.0
    depth_levels: 3
    depth_alpha: 0.6
    depth_gamma: 1.5
    skew_factor: 0.4
    funding_window: 5m

risk:
  daily_drawdown_halt_usd: 100
  dislocation_pct: 0.02
  dislocation_window: 30s
  fill_intensity_window: 2s
  fill_intensity_threshold: 3
  reconcile_interval: 30s

paper:
  initial_balance_usd: 5000

hyperliquid:
  enabled: false
  base_url: https://api.hyperliquid.xyz
  ws_url: wss://api.hyperliquid.xyz/ws
  private_key: ${HYPERLIQUID_PRIVATE_KEY}   # 32-byte hex (with or without 0x)
  vault_address: ""                          # optional vault hex
  mainnet: true

binance:
  enabled: false
  base_url: https://fapi.binance.com
  ws_url: wss://fstream.binance.com/ws
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_API_SECRET}
  quote_asset: USDT
  recv_window: 5000

price_feed:
  pyth:
    ws_url: wss://hermes.pyth.network/ws
    feed_ids:
      SOL: ef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d

storage:
  postgres:
    dsn: ${POSTGRES_DSN}

alerts:
  slack:
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
    notify_on_fill: false
    notify_on_error: true
    notify_on_circuit_breaker: true

metrics:
  addr: ":9090"
  snapshot_interval: 1m
