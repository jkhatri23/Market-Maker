log:
  level: info
  format: json

# Sizes assume BTC ≈ $78K, SOL ≈ $83. Tuned for a $5K paper balance:
#   BTC base 0.001 ≈ $78 / level, max 0.05 ≈ $3.9K notional
#   SOL base 0.5   ≈ $42 / level, max 5    ≈ $415 notional
assets:
  - symbol: BTC
    enabled: true
    base_quantity: 0.001
    spread_bps: 50
    requote_threshold_bps: 10
    max_position: 0.05
    max_leverage: 2.0
    depth_levels: 3
    depth_alpha: 0.6
    depth_gamma: 1.5
    skew_factor: 0.4
    funding_window: 5m
  - symbol: SOL
    enabled: true
    base_quantity: 0.5
    spread_bps: 80
    requote_threshold_bps: 15
    max_position: 5
    max_leverage: 2.0
    depth_levels: 3
    depth_alpha: 0.6
    depth_gamma: 1.5
    skew_factor: 0.4
    funding_window: 5m

risk:
  daily_drawdown_halt_usd: 100
  dislocation_pct: 0.02
  dislocation_window: 30s
  fill_intensity_window: 2s
  fill_intensity_threshold: 3
  reconcile_interval: 30s

paper:
  initial_balance_usd: 5000

price_feed:
  pyth:
    ws_url: wss://hermes.pyth.network/ws
    feed_ids:
      BTC: e62df6c8b4a85fe1a67db44dc12de5db330f7ac66b72dc658afedf0f4a415b43
      SOL: ef0d8b6fda2ceba41da15d4095d1da392a0d2f8ed0c6c7bc0f4cfac8c280b56d

storage:
  postgres:
    dsn: ${POSTGRES_DSN}

alerts:
  slack:
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
    notify_on_fill: false
    notify_on_error: true
    notify_on_circuit_breaker: true

metrics:
  addr: ":9090"
  snapshot_interval: 1m
